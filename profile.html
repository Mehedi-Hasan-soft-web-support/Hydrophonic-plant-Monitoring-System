<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Hydroponic Monitor</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">

<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">H</div>
    <span>Hydroponic Monitor</span>
  </div>
  <nav class="nav">
    <a href="dashboard.html" >Dashboard</a>
    <a href="devices.html">Devices</a>
    <a href="alerts.html">Alerts</a>
    <a href="admin.html">Admin</a>
    <a href="profile.html" class="active">Profile</a>
  </nav>
</aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h1>Profile</h1>
          <p>Update your user profile and account details.</p>
        </div>
        <div class="topbar-actions">
          <button id="themeBtn" class="secondary-btn">Theme</button>
          <button id="logoutBtn" class="danger-btn">Logout</button>
        </div>
      </header>

      <section class="panel" style="max-width:640px;">
        <form id="profileForm">
          <div class="form-group">
            <label>Email</label>
            <input id="profileEmail" type="email" disabled />
          </div>
          <div class="form-group">
            <label>Full Name</label>
            <input id="profileName" type="text" />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input id="profilePhone" type="text" />
          </div>
          <button class="primary-btn" type="submit">Save Profile</button>
        </form>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
