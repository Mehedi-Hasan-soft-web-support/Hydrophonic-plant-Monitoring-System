<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hydroponic Monitor | Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <section class="auth-hero">
      <div class="logo">
        <div class="logo-mark">H</div>
        <span>Hydroponic Monitor</span>
      </div>
      <h1>Smart plant monitoring for modern hydroponics.</h1>
      <p>
        Track water temperature, air temperature, humidity, TDS, turbidity, battery,
        sensor health and device status from anywhere.
      </p>
    </section>

    <section class="auth-forms">
      <div class="tabs">
        <button class="tab-button active" onclick="showPanel('login')">Login</button>
        <button class="tab-button" onclick="showPanel('signup')">Signup</button>
        <button class="tab-button" onclick="showPanel('forgot')">Forgot</button>
      </div>

      <form id="loginForm" class="form-panel active">
        <div class="form-group">
          <label>Email</label>
          <input id="loginEmail" type="email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="loginPassword" type="password" required />
        </div>
        <button class="primary-btn full" type="submit">Login</button>
        <div class="divider"></div>
        <button id="googleLoginBtn" class="secondary-btn full" type="button">Continue with Google</button>
      </form>

      <form id="signupForm" class="form-panel">
        <div class="form-group">
          <label>Full Name</label>
          <input id="signupName" type="text" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="signupEmail" type="email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="signupPassword" type="password" minlength="6" required />
        </div>
        <button class="primary-btn full" type="submit">Create Account</button>
      </form>

      <form id="forgotForm" class="form-panel">
        <div class="form-group">
          <label>Email</label>
          <input id="forgotEmail" type="email" required />
        </div>
        <button class="primary-btn full" type="submit">Send Reset Email</button>
      </form>
    </section>
  </main>

  <script>
    function showPanel(name) {
      document.querySelectorAll(".form-panel").forEach(panel => panel.classList.remove("active"));
      document.querySelectorAll(".tab-button").forEach(button => button.classList.remove("active"));
      document.getElementById(name + "Form").classList.add("active");
      event.target.classList.add("active");
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
